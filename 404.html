<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2332">

  <title>Page not found - Kitchen Rush</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="kr-app">
    <main class="kr-main">
      <div class="kr-container">

        <div class="kr-card kr-card--hero">
          <h1 class="kr-h1" data-kr-wording="notFound.title"></h1>

          <p class="kr-muted" data-kr-wording="notFound.line1"></p>

          <p class="kr-muted" data-kr-wording="notFound.line2"></p>

          <div class="kr-actions">
            <a href="./index.html" class="kr-btn kr-btn--primary" data-kr-wording="notFound.cta"></a>
          </div>
        </div>

      </div>
    </main>

    <footer id="kr-footer-root" class="kr-footer" role="contentinfo"></footer>
  </div>

  <!-- Config for wording + brand -->
  <script src="./config.js"></script>
  <script src="./email.js"></script>
  <script src="./footer.js"></script>

  <script>
    (function () {
      function apply() {
        try {
          var w = window.KR_WORDING;
          if (!w || typeof w !== "object") return;

          function getByPath(root, path) {
            var p = String(path || "").trim();
            if (!p) return null;
            var parts = p.split(".");
            var cur = root;
            for (var i = 0; i < parts.length; i++) {
              if (!cur || typeof cur !== "object") return null;
              cur = cur[parts[i]];
            }
            return (typeof cur === "string") ? cur : null;
          }

          document.querySelectorAll("[data-kr-wording]").forEach(function (el) {
            var key = el ? el.getAttribute("data-kr-wording") : "";
            var text = getByPath(w, key);
            if (typeof text === "string") el.textContent = text;
          });

          var brand = w.brand && w.brand.creatorLine;
          if (brand) {
            document.querySelectorAll('[data-kr-brand="creatorLine"]')
              .forEach(function (el) { if (el) el.textContent = brand; });
          }

          var version = String((window.KR_CONFIG && window.KR_CONFIG.version) || "").trim();
          if (version) {
            document.querySelectorAll("[data-kr-version]")
              .forEach(function (el) { if (el) el.textContent = "v" + version; });
          }
        } catch (_) { }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", apply);
      } else {
        apply();
      }
    })();
  </script>
</body>

</html>
