<!DOCTYPE html>
<html lang="en" data-kr-page="success">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Payment successful. Your Kitchen Rush activation code is ready.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.bonjourpickleball.fr/success.html">

  <!-- PWA & UI (match index.html) -->
  <meta name="theme-color" content="#1a2332">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kitchen Rush">

  <!-- Icons & manifest (match index.html) -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/kr-icon-192x192.png">
  <link rel="apple-touch-icon" href="./icons/kr-icon-192x192.png">

  <title>Activation Code Ready - Kitchen Rush</title>

  <!-- Styles -->
  <link rel="preload" href="./style.css" as="style">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="kr-app">
    <main class="kr-main">
      <div class="kr-container">

        <!-- Header (branding) -->
        <div class="kr-card kr-card--hero">
          <div class="kr-row kr-row--spaced kr-row--align-center kr-gap-2">
            <a class="kr-branding" href="./index.html" id="kr-success-branding" aria-label="">
              <img id="kr-success-logo" src="" alt="" class="kr-branding-logo kr-hidden-inline" />
              <span id="kr-success-name" class="kr-branding-name"></span>
            </a>
            <div class="kr-badge">THIS DEVICE</div>
          </div>

          <div class="kr-mt-3">
            <h1 class="kr-h1" data-kr-wording="success.title"></h1>
            <p class="kr-sub" data-kr-wording="success.subtitle"></p>
          </div>
        </div>

        <!-- Premium code -->
        <div class="kr-card">
          <div class="kr-row kr-row--spaced">
            <div class="kr-meta">
              <strong data-kr-wording="success.codeLabel"></strong>
            </div>
            <button class="kr-btn kr-btn--secondary" id="copy-btn" type="button" data-kr-wording="success.copyCta">
            </button>
          </div>

          <div class="kr-code kr-mt-4" id="code">KR-XXXX-XXXX</div>

          <div id="copy-status" class="kr-live kr-hidden kr-mt-3" role="status" aria-live="polite">
          </div>

          <div class="kr-divider"></div>

          <p class="kr-muted kr-mt-0">
            <span data-kr-wording="success.txtSaveLine"></span>
            <span data-kr-wording="success.txtNoRecoverLine"></span>
          </p>
          <p class="kr-muted kr-mt-2" data-kr-wording="success.clearDataWarning"></p>
        </div>

        <!-- Benefits -->
        <div class="kr-card">
          <div class="kr-meta"><strong data-kr-wording="success.benefitsTitle"></strong></div>
          <ul class="kr-list">
            <li data-kr-wording="success.benefitUnlimitedRuns"></li>
            <li data-kr-wording="success.benefitSprint"></li>
            <li data-kr-wording="success.benefitPersonalBest"></li>
          </ul>
        </div>

        <!-- Actions -->
        <div class="kr-card">
          <div class="kr-row kr-row--spaced">
            <a href="./index.html" class="kr-btn kr-btn--primary" data-kr-wording="success.ctaBackToGame">
            </a>

            <div class="kr-row kr-row--tight kr-row--end">
              <button id="download-code" class="kr-btn kr-btn--secondary" type="button"
                data-kr-wording="success.ctaDownload">
              </button>

              <button id="copy-again" class="kr-btn kr-btn--secondary" type="button"
                data-kr-wording="success.copyAgainCta">
              </button>
            </div>
          </div>

          <p class="kr-muted" data-kr-wording="success.shortcutHint"></p>
        </div>

        <!-- Footer note -->
        <p class="kr-muted kr-text-center kr-mt-5" data-kr-wording="success.thankYouLine">
        </p>

        <!-- Support (obfuscated) -->
        <p class="kr-muted kr-text-center kr-mt-4 kr-fs-xs">
          <span data-kr-wording="success.supportLabel"></span>
          <a href="#" data-user="contact" data-domain="bonjourpickleball.fr">Contact Bonjour Pickleball</a>
        </p>

      </div>
    </main>

    <footer id="kr-footer-root" class="kr-footer" role="contentinfo"></footer>
  </div>

  <!-- Scripts: config non-defer for inline success logic -->
  <script src="./config.js"></script>
  <script src="./email.js"></script>
  <script src="./footer.js"></script>
  <script src="./success.js"></script>
</body>

</html>
